services:
  systemarr:
    image: ghcr.io/nino1500/systemarr:latest
    pull_policy: always
    container_name: systemarr
    restart: unless-stopped
    ports:
      - "3010:3010"
    volumes:
      - type: bind
        source: /
        target: /host
        read_only: true
        bind:
          propagation: rslave
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3010/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
