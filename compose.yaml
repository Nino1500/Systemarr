services:
  systemarr:
    build: .
    image: systemarr:local
    container_name: systemarr
    restart: unless-stopped
    ports:
      - "${SYSTEMARR_PORT:-3010}:3010"
    environment:
      PORT: 3010
      HOST_ROOT: /host
      PROC_ROOT: /host/proc
      SYS_ROOT: /host/sys
      REFRESH_SECONDS: ${REFRESH_SECONDS:-2}
      DISK_PATHS: ${DISK_PATHS:-}
    volumes:
      - type: bind
        source: /
        target: /host
        read_only: true
        bind:
          propagation: rslave
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3010/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
